services:
  falcon:
    build:
      context: .
      dockerfile: Dockerfile
    image: sdp26-falcon:latest
    container_name: falcon-drone
    
    # Network mode host to allow UDP communication with drone
    network_mode: host
    
    # Mount volumes for development
    volumes:
      - ./software:/app/software
      - ./data:/app/data
      - ./results:/app/results
      - /tmp/.X11-unix:/tmp/.X11-unix
    
    # X11 display for OpenCV windows on Linux
    environment:
      - DISPLAY=${DISPLAY}
    
    # Keep container running for interactive use
    stdin_open: true
    tty: true
    
    # Override default command if needed
    # command: python software/src/falcon.py
